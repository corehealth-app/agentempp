# Exemplo de workflow CI — copie para .github/workflows/ci.yml manualmente
# Não foi criado automaticamente para evitar acionar o hook de segurança
# do agente; revise e adicione conforme sua org permitir.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm --filter @mpp/core test

      - name: Build admin
        run: pnpm --filter @mpp/admin build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy
          SUPABASE_SERVICE_ROLE_KEY: dummy

